<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>amidependent.com – Contact</title>
<style>
  body{
    font-family:Arial,sans-serif;
    background:#dcdcdc;
    color:#000;
    margin:0;
    padding-top:70px;      /* space for navbar */
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none}

  /* NAVBAR */
  .navbar{
    position:fixed;top:0;left:0;right:0;
    height:60px;background:#fff;
    box-shadow:0 2px 4px rgba(0,0,0,.1);
    display:flex;justify-content:space-between;align-items:center;
    padding:0 16px;z-index:1000;
  }
  .navbar-logo{font-weight:700;font-size:1.25rem;}
  .navbar-logo span{font-family:"Courier New",monospace;text-transform:uppercase;color:green;}

  #nav-links{display:none;gap:24px;}
  #nav-links a{font-weight:500;font-size:1rem;}

  .hamburger{width:28px;height:22px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;}
  .hamburger span{height:4px;background:#000;border-radius:2px;}

  /* SIDE‑DRAWER */
  .side-drawer{
    position:fixed;top:0;right:0;height:100%;width:250px;
    background:#fff;box-shadow:-2px 0 5px rgba(0,0,0,.2);
    transform:translateX(100%);transition:transform .3s ease;
    display:flex;flex-direction:column;padding:80px 20px;z-index:999;
  }
  .side-drawer.show{transform:translateX(0);}
  .side-drawer a{font-size:1.1rem;margin-bottom:16px;}

  .overlay{
    position:fixed;top:0;left:0;width:100vw;height:100vh;
    background:rgba(0,0,0,.3);display:none;z-index:998;
  }
  .overlay.show{display:block;}

  /* MAIN CONTENT */
  .container{width:100%;max-width:600px;padding:20px;}
  form{display:flex;flex-direction:column;gap:12px;}
  input,textarea{
    padding:10px;font-size:1em;border:1px solid #888;border-radius:4px;
  }
  button{
    padding:10px;font-size:1em;cursor:pointer;border:none;background:#0077cc;color:#fff;border-radius:4px;
  }
  button:hover{background:#005fa3;}

  /* DESKTOP */
  @media(min-width:768px){
    .hamburger{display:none;}
    #nav-links{display:flex;}
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-logo">am<span id="color-changing-i-nav">I</span>dependent</div>
  <div id="hamburger" class="hamburger" role="button" aria-expanded="false">
    <span></span><span></span><span></span>
  </div>
  <div id="nav-links">
    <a href="index.html">Home</a>
    <a href="ways.html">Ways to Be Independent</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy Policy</a>
  </div>
</nav>

<aside id="side-drawer" class="side-drawer" aria-hidden="true">
  <a href="index.html">Home</a>
  <a href="ways.html">Ways to Be Independent</a>
  <a href="about.html">About Us</a>
  <a href="contact.html">Contact</a>
  <a href="privacy.html">Privacy Policy</a>
</aside>
<div id="overlay" class="overlay"></div>

<div class="container">
  <h1>Contact Us</h1>
  <p>Have a question or feedback? Fill out the form below and we’ll get back to you.</p>

  <form action="mailto:info@amidependent.com" method="post" enctype="text/plain">
    <input type="text" name="Name" placeholder="Your Name" required />
    <input type="email" name="Email" placeholder="Your Email" required />
    <textarea name="Message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</div>

<script>
  /* Drawer logic */
  const hamburger=document.getElementById('hamburger');
  const sideDrawer=document.getElementById('side-drawer');
  const overlay=document.getElementById('overlay');

  function toggleDrawer(){
    const open=sideDrawer.classList.toggle('show');
    overlay.classList.toggle('show',open);
    hamburger.setAttribute('aria-expanded',open);
  }
  hamburger.addEventListener('click',toggleDrawer);
  overlay.addEventListener('click',toggleDrawer);
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&sideDrawer.classList.contains('show'))toggleDrawer();
  });

  /* Blinking I */
  const iNav=document.getElementById('color-changing-i-nav');
  iNav.style.color='green';
  setInterval(()=>{iNav.style.color=iNav.style.color==='green'?'red':'green';},3000);
</script>

</body>
</html>
